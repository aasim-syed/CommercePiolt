version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: commercepilot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: dev
    volumes:
      - ./backend/app:/app/app
      - ./backend/.env:/app/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: commercepilot-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    depends_on:
      - backend
    restart: unless-stopped